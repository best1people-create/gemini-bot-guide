<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fee500">
  <title>제미니봇 명령어</title>
  <style>
    * { box-sizing: border-box; }
    :root { --yellow:#fee500; --ink:#191919; --muted:#73777f; --card:#fff; --bg:#f3f4f6; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:Arial,"Malgun Gothic",sans-serif; }
    button { font:inherit; }
    .wrap { width:min(720px,100%); margin:0 auto; padding:18px 16px 42px; }
    .hero { position:relative; overflow:hidden; padding:25px 22px; border-radius:24px; background:var(--yellow); box-shadow:0 12px 30px rgba(65,55,0,.13); }
    .hero:after { content:""; position:absolute; right:-35px; top:-45px; width:145px; height:145px; border-radius:50%; background:rgba(255,255,255,.34); }
    .eyebrow { margin:0 0 7px; font-size:13px; font-weight:800; letter-spacing:.08em; }
    h1 { position:relative; z-index:1; margin:0; font-size:29px; line-height:1.2; }
    .hero p { position:relative; z-index:1; margin:10px 0 0; font-size:14px; line-height:1.55; }
    .search { width:100%; margin:15px 0 6px; padding:14px 16px; border:1px solid #e2e4e8; border-radius:15px; outline:none; background:#fff; font-size:15px; box-shadow:0 5px 18px rgba(0,0,0,.05); }
    .search:focus { border-color:#2d2d2d; box-shadow:0 0 0 3px rgba(254,229,0,.55); }
    .section { margin-top:14px; padding:17px; border-radius:20px; background:var(--card); box-shadow:0 5px 18px rgba(0,0,0,.055); animation:rise .4s ease both; }
    .section h2 { margin:0 0 12px; font-size:17px; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:9px; }
    .cmd { min-height:47px; padding:11px 10px; border:1px solid #eceef1; border-radius:13px; background:#fafafa; color:#252525; font-weight:700; text-align:left; cursor:pointer; transition:transform .16s ease,background .16s ease,box-shadow .16s ease; }
    .cmd:active { transform:scale(.96); background:var(--yellow); }
    .empty { display:none; padding:30px 10px; color:var(--muted); text-align:center; }
    .foot { margin:18px 4px 0; color:var(--muted); font-size:12px; line-height:1.55; text-align:center; }
    .shade { position:fixed; inset:0; z-index:20; visibility:hidden; opacity:0; background:rgba(0,0,0,.48); transition:.22s ease; }
    .shade.open { visibility:visible; opacity:1; }
    .sheet { position:absolute; left:50%; bottom:0; width:min(720px,100%); padding:10px 18px calc(22px + env(safe-area-inset-bottom)); border-radius:25px 25px 0 0; background:#fff; transform:translate(-50%,105%); transition:transform .28s cubic-bezier(.2,.8,.2,1); }
    .shade.open .sheet { transform:translate(-50%,0); }
    .handle { width:42px; height:5px; margin:0 auto 16px; border-radius:9px; background:#d9dce1; }
    .tag { display:inline-block; padding:5px 9px; border-radius:99px; background:#fff7b8; font-size:12px; font-weight:800; }
    .sheet h3 { margin:12px 0 7px; font-size:24px; }
    .desc { margin:0 0 17px; color:#555b63; line-height:1.55; }
    .label { margin:13px 0 7px; color:#777c84; font-size:12px; font-weight:800; }
    .code { padding:13px 14px; border-radius:13px; background:#f3f4f6; font-family:Consolas,monospace; font-size:14px; line-height:1.5; white-space:pre-wrap; }
    .actions { display:grid; grid-template-columns:1fr auto; gap:9px; margin-top:17px; }
    .copy,.close { padding:13px 16px; border:0; border-radius:13px; cursor:pointer; font-weight:800; }
    .copy { background:var(--yellow); color:#191919; }
    .close { background:#eceef1; color:#333; }
    .toast { position:fixed; left:50%; bottom:24px; z-index:40; opacity:0; padding:10px 15px; border-radius:99px; background:#222; color:#fff; transform:translate(-50%,20px); transition:.2s; pointer-events:none; }
    .toast.show { opacity:1; transform:translate(-50%,0); }
    @keyframes rise { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
    @media (min-width:560px) { .grid { grid-template-columns:repeat(3,minmax(0,1fr)); } }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <p class="eyebrow">GEMINI BOT GUIDE</p>
      <h1 id="title">명령어 안내</h1>
      <p>명령어를 누르면 사용법과 입력 예시를 볼 수 있어요.</p>
    </header>
    <input id="search" class="search" type="search" placeholder="명령어 검색 (예: 날씨, 선택지)" aria-label="명령어 검색">
    <div id="sections"></div>
    <div id="empty" class="empty">검색 결과가 없습니다.</div>
    <p class="foot">AI 대화 분석 기능은 오전 8시 이후 대화가 충분해야 사용할 수 있습니다.</p>
  </main>

  <div id="shade" class="shade" role="dialog" aria-modal="true" aria-hidden="true">
    <section class="sheet">
      <div class="handle"></div>
      <span id="category" class="tag"></span>
      <h3 id="commandTitle"></h3>
      <p id="description" class="desc"></p>
      <p class="label">사용법</p><div id="usage" class="code"></div>
      <p class="label">입력 예시</p><div id="example" class="code"></div>
      <div class="actions"><button id="copy" class="copy">예시 복사</button><button id="close" class="close">닫기</button></div>
    </section>
  </div>
  <div id="toast" class="toast">복사했습니다</div>

    var roomKey = rooms[params.get("room")] ? params.get("room") : "alpha";
    var room = rooms[roomKey];
    var sections = document.getElementById("sections");
    var search = document.getElementById("search");
    var shade = document.getElementById("shade");
    var selectedExample = "";
    document.getElementById("title").textContent = room.title;

    function render(query) {
      sections.innerHTML = "";
      var count = 0;
      query = String(query || "").trim().toLowerCase();
      for (var category in room.categories) {
        if (!room.categories.hasOwnProperty(category)) continue;
        var commands = room.categories[category];
        var filtered = [];
        for (var i=0;i<commands.length;i++) {
          var detail = info[commands[i]] || ["명령어를 실행합니다.",commands[i],commands[i]];
          var haystack = (commands[i]+" "+detail.join(" ")).toLowerCase();
          if (!query || haystack.indexOf(query)!==-1) filtered.push(commands[i]);
        }
        if (!filtered.length) continue;
        var box=document.createElement("section"); box.className="section";
        var heading=document.createElement("h2"); heading.textContent=category; box.appendChild(heading);
        var grid=document.createElement("div"); grid.className="grid";
        for (var j=0;j<filtered.length;j++) {
          var button=document.createElement("button"); button.className="cmd"; button.textContent=filtered[j]; button.setAttribute("data-command",filtered[j]); grid.appendChild(button); count++;
        }
        box.appendChild(grid); sections.appendChild(box);
      }
      document.getElementById("empty").style.display=count?"none":"block";
    }

    function openCommand(command) {
      var detail=info[command] || ["명령어를 실행합니다.",command,command];
      selectedExample=detail[2];
      document.getElementById("category").textContent=room.title;
      document.getElementById("commandTitle").textContent=command;
      document.getElementById("description").textContent=detail[0];
      document.getElementById("usage").textContent=detail[1];
      document.getElementById("example").textContent=detail[2];
      shade.className="shade open"; shade.setAttribute("aria-hidden","false");
    }
    function closeSheet(){ shade.className="shade"; shade.setAttribute("aria-hidden","true"); }
    sections.onclick=function(e){ var button=e.target.closest("[data-command]"); if(button) openCommand(button.getAttribute("data-command")); };
    search.oninput=function(){ render(this.value); };
    document.getElementById("close").onclick=closeSheet;
    shade.onclick=function(e){ if(e.target===shade) closeSheet(); };
    document.getElementById("copy").onclick=function(){
      if(navigator.clipboard){ navigator.clipboard.writeText(selectedExample); }
      var toast=document.getElementById("toast"); toast.className="toast show"; setTimeout(function(){toast.className="toast";},1300);
    };
    document.onkeydown=function(e){ if(e.key==="Escape") closeSheet(); };
    render("");
  </script>
</body>
</html>
